project:
  name: newspaper-partisanship-ml
  version: "1.0.0"

# Data paths
paths:
  processed_base: "hdfs://cluster/processed/newspapers/"
  feature_store: "hdfs://cluster/feature_store/newspaper_features_v1"
  predictions: "hdfs://cluster/predictions/newspaper_predictions_v1"
  drift_metrics: "hdfs://cluster/monitoring/newspaper_drift_metrics_v1"
  eval_predictions: "hdfs://cluster/predictions/predictions_1869_eval_v1"
  mlflow_artifacts: "hdfs://cluster/mlflow/artifacts"

# Year ranges
years:
  train: 1869
  inference: [1870, 1871, 1872, 1873, 1874]
  reference: 1869

# Label semantics
labels:
  democratic: 0.0
  republican: 1.0
  independent: 2.0
  other: 3.0
  train_labels: [0.0, 1.0]

label_column_metadata: "contents"
label_delimiter: "; "

# Text preprocessing
preprocessing:
  paragraph_separator: "\n\n"
  min_paragraph_words: 100
  max_paragraph_tokens: 1000
  min_word_length: 4
  stopwords_source: "nltk"
  lowercase: true

# Feature engineering
features:
  vectorizer: "hashing_tf_idf"
  num_features: 262144
  min_doc_freq: 2
  feature_column: "features"
  label_column: "label"
  feature_store_name: "newspaper_features_v1"
  feature_store_version: "v1"

# Train / test split
split:
  train_ratio: 0.8
  test_ratio:  0.2
  seed: 0
  strategy: "group_aware"

# Logging
logging:
  level: "INFO"
  log_file: "logs/pipeline.log"
  rotation: "1 week"