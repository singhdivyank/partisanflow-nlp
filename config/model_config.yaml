# Model configuration
mlflow:
  tracking_uri:    "http://localhost:5000"    # override via MLFLOW_TRACKING_URI env var
  experiment_name: "newspaper_partisanship"
  registry_name:   "newspaper_partisanship_classifier"
  promotion_thresholds:
    f1_improvement: 0.01 
    min_accuracy: 0.70

# Model registry stages
registry:
  staging_stage: "Staging"
  production_stage: "Production"
  tags:
    data_version: "v1"
    feature_store: "newspaper_features_v1"

# Models
models:

  logistic_regression:
    enabled: true
    class: "pyspark.ml.classification.LogisticRegression"
    params:
      featuresCol: "features"
      labelCol: "label"
      predictionCol: "prediction"
      probabilityCol: "probability"
      rawPredictionCol: "rawPrediction"
      family: "multinomial"
      maxIter: 100
      regParam: 0.01
      elasticNetParam: 0.0
      tol: 1.0e-6
      fitIntercept: true
    hyperparam_grid:
      regParam: [0.001, 0.01, 0.1]
      elasticNetParam: [0.0, 0.5, 1.0]
      maxIter: [50, 100]

  naive_bayes:
    enabled: true
    class: "pyspark.ml.classification.NaiveBayes"
    params:
      featuresCol: "features"
      labelCol: "label"
      predictionCol: "prediction"
      probabilityCol: "probability"
      modelType: "multinomial"
      smoothing: 1.0
    hyperparam_grid:
      smoothing: [0.5, 1.0, 2.0]

  linear_svc:
    enabled: true
    class: "pyspark.ml.classification.LinearSVC"
    params:
      featuresCol: "features"
      labelCol: "label"
      predictionCol: "prediction"
      maxIter: 100
      regParam: 0.01
      tol: 1.0e-6
      fitIntercept: true
    hyperparam_grid:
      regParam: [0.001, 0.01, 0.1]
      maxIter:  [50, 100]

# Evaluation metrics
evaluation:
  primary_metric: "f1"
  metrics:
    - accuracy
    - f1
    - weightedPrecision
    - weightedRecall
  # BinaryClassificationEvaluator metrics (LR / NB only — SVC has no probability)
  binary_metrics:
    - areaUnderROC
    - areaUnderPR
  label_column:      "issue_label"
  prediction_column: "prediction"